<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛車サイズ早見表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700;900&family=JetBrains+Mono:wght@600;700&display=swap');

  :root{
    --bg:#0f1218;
    --panel:#171b23;
    --panel-2:#1d232d;
    --line:#2a3140;
    --text:#eef0f4;
    --text-dim:#8891a3;
    --accent:#e6b566;
    --accent-soft:#e6b56622;
    --accent-deep:#e6b566;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Serif JP',serif;
    line-height:1.8;
    -webkit-font-smoothing:antialiased;
    word-break:keep-all;
    overflow-wrap:break-word;
  }
  .page{max-width:900px;margin:0 auto;padding:56px 24px 40px;}

  /* ---------- HERO ---------- */
  .hero{text-align:center;padding-bottom:36px;}
  .brand{
    font-size:14px;
    letter-spacing:.3em;
    color:var(--text-dim);
    margin-bottom:22px;
    font-weight:600;
  }
  .divider-label{
    display:flex;align-items:center;justify-content:center;gap:16px;
    margin-bottom:20px;
  }
  .divider-label .line{width:44px;height:1px;background:var(--accent);}
  .divider-label span{
    font-size:11.5px;
    letter-spacing:.24em;
    color:var(--accent-deep);
    font-weight:600;
    white-space:nowrap;
  }
  h1{
    font-weight:700;
    font-size:clamp(26px,4.6vw,38px);
    line-height:1.55;
    margin:0 0 18px;
    letter-spacing:.02em;
  }
  .lead{
    color:var(--text-dim);
    font-size:14.5px;
    max-width:440px;
    margin:0 auto 36px;
  }

  /* ---------- SEARCH PANEL ---------- */
  .search-panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:0;
    padding:32px;
    display:grid;
    grid-template-columns:1.15fr 1fr;
    gap:36px;
    margin-bottom:14px;
  }
  .panel-col-label{
    font-size:13.5px;
    font-weight:600;
    color:var(--text);
    margin-bottom:12px;
  }
  .search-wrap{position:relative;margin-bottom:26px;}
  #search{
    width:100%;
    padding:15px 18px;
    font-size:15px;
    font-family:'Noto Serif JP',serif;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:0;
    color:var(--text);
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  #search::placeholder{color:#5b6272;font-size:13.5px;}
  #search:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .suggestions{
    position:absolute;
    left:0;right:0;top:calc(100% + 8px);
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:0;
    overflow:hidden;
    text-align:left;
    z-index:10;
    display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
  }
  .suggestions.show{display:block;}
  .sugg-item{
    padding:12px 16px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    border-bottom:1px solid var(--line);
  }
  .sugg-item:last-child{border-bottom:none;}
  .sugg-item:hover{background:var(--panel-2);}
  .sugg-maker{color:var(--text-dim);font-size:11.5px;}
  .sugg-badge{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    color:var(--accent-deep);
    font-size:12px;
    margin-left:10px;
  }

  .select-wrap{margin-bottom:16px;}
  select{
    width:100%;
    padding:14px 16px;
    font-size:14.5px;
    font-family:'Noto Serif JP',serif;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:0;
    color:var(--text);
    outline:none;
    appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%238891a3'><path d='M5 7l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
    cursor:pointer;
  }
  select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}

  @media (max-width:680px){
    .search-panel{grid-template-columns:1fr;}
  }

  /* ---------- RESULT ---------- */
  .result{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:0;
    padding:30px 30px;
    margin:20px 0 44px;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .35s ease, transform .35s ease;
  }
  .result.show{opacity:1;transform:translateY(0);}
  .result.hidden{display:none;}

  .result-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .result-maker{color:var(--text-dim);font-size:12.5px;margin-bottom:3px;}
  .result-name{font-weight:700;font-size:22px;}
  .result-size{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:24px;
    color:var(--bg);
    background:var(--accent);
    padding:6px 20px;
    border-radius:0;
    white-space:nowrap;
  }
  .result-note{color:var(--text-dim);font-size:13px;margin-top:8px;}
  .not-found{color:var(--text-dim);font-size:14px;}
  .not-found b{color:var(--text);}

  /* ---------- SCALE ---------- */
  .scale-section{margin-bottom:26px;}
  .scale-strip{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:0;
    padding:24px 20px 16px;
    gap:6px;
  }
  .scale-item{
    display:flex;flex-direction:column;align-items:center;flex:1;
    color:#cfc3a0;
    transition:color .3s ease, filter .3s ease;
  }
  .scale-item svg{display:block;transition:transform .3s ease;}
  .scale-item .label{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:12.5px;margin-top:9px;
  }
  .scale-item .desc{font-size:10px;color:var(--text-dim);margin-top:2px;text-align:center;}
  .scale-item.match{color:var(--accent-deep);}
  .scale-item.match .label{color:var(--accent-deep);}
  .scale-item.match svg{filter:drop-shadow(0 0 8px var(--accent-soft));}

  /* ---------- SIZE GUIDE ACCORDION ---------- */
  .guide{margin-bottom:20px;}
  #toggleGuide{
    width:100%;text-align:left;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:16px 20px;border-radius:0;
    font-size:14px;font-family:'Noto Serif JP',serif;font-weight:600;
    cursor:pointer;display:flex;justify-content:space-between;
  }
  #toggleGuide:hover{border-color:var(--accent);}
  .guide-body{margin-top:14px;}
  .guide-body.hidden{display:none;}
  .guide-intro{color:var(--text-dim);font-size:12.5px;margin-bottom:16px;}
  .guide-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
  }
  .guide-card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:0;padding:18px 18px 14px;
  }
  .guide-card h3{
    margin:0 0 10px;font-size:15px;font-weight:700;
    display:flex;align-items:center;gap:8px;
  }
  .guide-card h3 .code{
    font-family:'JetBrains Mono',monospace;color:var(--accent-deep);
  }
  .guide-card ul{margin:0;padding:0;list-style:none;}
  .guide-card li{
    font-size:12.5px;color:var(--text-dim);padding:4px 0;
    border-bottom:1px solid var(--line);
  }
  .guide-card li:last-child{border-bottom:none;}
  @media (max-width:680px){ .guide-grid{grid-template-columns:1fr 1fr;} }

  footer{
    color:var(--text-dim);font-size:12px;text-align:center;
    border-top:1px solid var(--line);padding-top:22px;
  }

  @media (max-width:480px){
    .page{padding:38px 16px 32px;}
    .scale-strip{padding:18px 8px 12px;}
    .scale-item .desc{display:none;}
    .result-top{flex-direction:column;}
    .search-panel{padding:22px;}
    .guide-grid{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
</style>
</head>

<div class="page">

  <div class="hero">
    <div class="brand">RACY'SPEED</div>
    <div class="divider-label"><span class="line"></span><span>CAR SIZE CHECK</span><span class="line"></span></div>
    <h1>愛車のサイズ、<br>今すぐわかります。</h1>
    <p class="lead">車種名を入力すると、コーティング料金の基準になる<br>車両サイズ（SS〜XXL）が分かります。</p>
  </div>

  <div class="search-panel">
    <div>
      <div class="panel-col-label">車種名で検索</div>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="例：プリウス、アルファード、BMW X3、ベンツ" autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
      </div>
    </div>
    <div>
      <div class="panel-col-label">またはメーカーから選択</div>
      <div class="select-wrap">
        <select id="makerSelect"><option value="">メーカーを選択</option></select>
      </div>
      <div class="select-wrap">
        <select id="modelSelect" disabled><option value="">車種を選択</option></select>
      </div>
    </div>
  </div>

  <div id="result" class="result hidden"></div>

  <div class="scale-section">
    <div class="scale-strip" id="scaleStrip"></div>
  </div>

  <div class="guide">
    <button id="toggleGuide">▼ サイズ区分の目安を見る<span id="guideArrow"></span></button>
    <div id="guideBody" class="guide-body hidden"></div>
  </div>

  <footer>
    表示されるサイズはキーパー基準（車両体積）に準拠した目安です。<br>年式・グレードにより異なる場合がございますので、正式なサイズは来店時にご確認ください。
  </footer>
</div>

function carSVG(sizeCode, scale, isMatch){
  const shape = CAR_SHAPES[sizeCode];
  const w = Math.round(58*scale), h = Math.round(29*scale);
  const bodyGradId = 'bg'+sizeCode, shineId = 'sh'+sizeCode, shadowId = 'sd'+sizeCode, sideId = 'sc'+sizeCode;
  const bodyStops = isMatch
    ? '<stop offset="0" stop-color="#f8dea3"/><stop offset="0.5" stop-color="#e6b566"/><stop offset="1" stop-color="#9c7038"/>'
    : '<stop offset="0" stop-color="#626a7a"/><stop offset="0.5" stop-color="#3a3f4b"/><stop offset="1" stop-color="#1d212a"/>';
  const hub = isMatch ? '#f0c778' : '#6b7280';
  const roofHiColor = isMatch ? '#fff3d6' : '#aeb4c0';
  const wheelsSvg = shape.wheels.map(([x,y])=>
    `<circle cx="${x}" cy="${y}" r="${shape.wheelR}" fill="#101218"/>
     <circle cx="${x}" cy="${y}" r="${(shape.wheelR*0.78).toFixed(1)}" fill="#22262f"/>
     <circle cx="${x}" cy="${y}" r="${(shape.wheelR*0.4).toFixed(1)}" fill="${hub}"/>`
  ).join('');
  const extra = shape.roofRail
    ? `<rect x="${shape.roofHi[0]+2}" y="${shape.roofHi[2]-1.8}" width="${shape.roofHi[1]-shape.roofHi[0]-4}" height="1.8" rx="0.9" fill="${hub}" opacity="0.85"/>`
    : shape.doorSeamX
      ? `<line x1="${shape.doorSeamX}" y1="${shape.roofHi[2]+6}" x2="${shape.doorSeamX}" y2="43" stroke="#0c0e12" stroke-width="1" opacity="0.35"/>`
      : '';
  const [hiX1,hiX2,hiY] = shape.roofHi;
  return `<svg width="${w}" height="${h}" viewBox="0 0 120 58" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="${bodyGradId}" x1="0" y1="0" x2="0" y2="1">${bodyStops}</linearGradient>
      <linearGradient id="${sideId}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#000000" stop-opacity="0"/>
        <stop offset="0.72" stop-color="#000000" stop-opacity="0"/>
        <stop offset="1" stop-color="#000000" stop-opacity="0.32"/>
      </linearGradient>
      <linearGradient id="${shineId}" x1="0" y1="0" x2="1" y2="0.85">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="0.46" stop-color="#ffffff" stop-opacity="0.62"/>
        <stop offset="0.54" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="${shadowId}" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#000000" stop-opacity="0.45"/>
        <stop offset="1" stop-color="#000000" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <ellipse cx="60" cy="52" rx="44" ry="4.5" fill="url(#${shadowId})"/>
    <path d="${shape.body}" fill="url(#${bodyGradId})"/>
    <path d="${shape.body}" fill="url(#${sideId})"/>
    <path d="${shape.glass}" fill="#0f1116" opacity="0.6"/>
    ${extra}
    <line x1="${hiX1}" y1="${hiY-0.3}" x2="${hiX2}" y2="${hiY-0.3}" stroke="${roofHiColor}" stroke-width="1.1" opacity="0.65" stroke-linecap="round"/>
    <path d="${shape.body}" fill="url(#${shineId})"/>
    ${wheelsSvg}
  </svg>`;
}

function renderScale(matchSize){
  const strip = document.getElementById('scaleStrip');
  strip.innerHTML = SIZE_ORDER.map(sz=>{
    const isMatch = sz === matchSize;
    return `<div class="scale-item ${isMatch?'match':''}">
      ${carSVG(sz, SIZE_SCALE[sz], isMatch)}
      <div class="label">${sz}</div>
      <div class="desc">${SIZE_DESC[sz]}</div>
    </div>`;
  }).join('');
}
renderScale(null);

/* ===================== 検索まわり ===================== */
const searchInput = document.getElementById('search');
const suggestionsEl = document.getElementById('suggestions');
const resultEl = document.getElementById('result');

function normalize(s){ return s.toLowerCase().replace(/\s/g,''); }

function matchesQuery(c, nq){
  if(normalize(c.name).includes(nq)) return true;
  if(normalize(c.maker).includes(nq)) return true;
  if(c.aliases && c.aliases.some(a=>normalize(a).includes(nq))) return true;
  return false;
}

function search(q){
  const nq = normalize(q);
  if(!nq) return [];
  return CARS.filter(c => matchesQuery(c, nq)).slice(0,7);
}

function showResult(car){
  resultEl.classList.remove('hidden');
  if(car){
    resultEl.innerHTML = `
      <div class="result-top">
        <div>
          <div class="result-maker">${car.maker}</div>
          <div class="result-name">${car.name}</div>
        </div>
        <div class="result-size">${car.size}</div>
      </div>
      <div class="result-note">${SIZE_DESC[car.size]}クラスです。コーティング料金はこのサイズを基準にご案内します。</div>
    `;
    renderScale(car.size);
  } else {
    resultEl.innerHTML = `<div class="not-found">該当する車種が見つかりませんでした。お手数ですが<b>スタッフまでお尋ねください</b>。</div>`;
    renderScale(null);
  }
  requestAnimationFrame(()=> resultEl.classList.add('show'));
  resultEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim();
  if(!q){
    suggestionsEl.classList.remove('show');
    return;
  }
  const matches = search(q);
  if(matches.length){
    suggestionsEl.innerHTML = matches.map(c=>
      `<div class="sugg-item" data-name="${c.name}" data-maker="${c.maker}">
        <span>${c.name} <span class="sugg-maker">/ ${c.maker}</span></span>
        <span class="sugg-badge">${c.size}</span>
      </div>`
    ).join('');
    suggestionsEl.classList.add('show');
  } else {
    suggestionsEl.innerHTML = `<div class="sugg-item">候補が見つかりません</div>`;
    suggestionsEl.classList.add('show');
  }
});

suggestionsEl.addEventListener('click', (e)=>{
  const item = e.target.closest('.sugg-item');
  if(!item || !item.dataset.name) return;
  const car = CARS.find(c=>c.name === item.dataset.name && c.maker === item.dataset.maker);
  searchInput.value = car.name;
  suggestionsEl.classList.remove('show');
  showResult(car);
});

searchInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    const q = searchInput.value.trim();
    const matches = search(q);
    if(matches.length) showResult(matches[0]);
    else showResult(null);
    suggestionsEl.classList.remove('show');
  }
});

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) suggestionsEl.classList.remove('show');
});

/* ===================== メーカー/車種プルダウン ===================== */
const makerSelect = document.getElementById('makerSelect');
const modelSelect = document.getElementById('modelSelect');

const makers = [...new Set(CARS.map(c=>c.maker))];
makers.forEach(m=>{
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m;
  makerSelect.appendChild(opt);
});

makerSelect.addEventListener('change', ()=>{
  const maker = makerSelect.value;
  modelSelect.innerHTML = '<option value="">車種を選択</option>';
  if(!maker){ modelSelect.disabled = true; return; }
  modelSelect.disabled = false;
  CARS.filter(c=>c.maker===maker).forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.name; opt.textContent = c.name;
    modelSelect.appendChild(opt);
  });
});

modelSelect.addEventListener('change', ()=>{
  const maker = makerSelect.value;
  const name = modelSelect.value;
  if(!name) return;
  const car = CARS.find(c=>c.maker===maker && c.name===name);
  if(car) showResult(car);
});

/* ===================== サイズ区分の目安 ===================== */
const toggleGuideBtn = document.getElementById('toggleGuide');
const guideBody = document.getElementById('guideBody');
let guideBuilt = false;

toggleGuideBtn.addEventListener('click', ()=>{
  guideBody.classList.toggle('hidden');
  if(!guideBuilt){ buildGuide(); guideBuilt = true; }
});

function buildGuide(){
  const bySize = {};
  SIZE_ORDER.forEach(sz=> bySize[sz] = []);
  CARS.forEach(c=>{ if(bySize[c.size].length < 4) bySize[c.size].push(c.name); });

  guideBody.innerHTML = `
    <div class="guide-intro">車両サイズはお車の大きさをもとに、SS〜XXLで分類しています。実際のお車の状態や仕様により、店頭確認時に前後する場合があります。</div>
    <div class="guide-grid">
      ${SIZE_ORDER.map(sz=>`
        <div class="guide-card">
          <h3><span class="code">${sz}</span>サイズ<span style="font-size:11px;color:var(--text-dim);font-weight:400;">（${SIZE_DESC[sz]}）</span></h3>
          <ul>${bySize[sz].map(n=>`<li>${n}</li>`).join('')}</ul>
        </div>
      `).join('')}
    </div>
  `;
}
